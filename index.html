<!DOCTYPE html>
<html>

<head>
<title>Stakeholder Directory</title>

<style>
body{
font-family: Arial;
margin:40px;
}

table{
border-collapse: collapse;
width:100%;
}

th, td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#f2f2f2;
}

input{
padding:10px;
margin-bottom:20px;
width:300px;
}
</style>

</head>

<body>

<h2>Stakeholder Directory</h2>

<input type="text" id="searchInput" placeholder="Search stakeholders...">

<table id="stakeholderTable">

<thead>
<tr>
<th>Name</th>
<th>Country</th>
<th>Designation</th>
<th>Email</th>
<th>LinkedIn</th>
</tr>
</thead>

<tbody id="tableBody">
<tr>
<td>Example Person</td>
<td>France</td>
<td>Producer</td>
<td>example@email.com</td>
<td>linkedin.com/example</td>
</tr>
</tbody>

</table>

<script src="script.js"></script>

</body>
</html>
